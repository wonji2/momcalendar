<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>맘캘린더 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:#F7F5FF;min-height:100vh}
/* 로그인 */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,.1);text-align:center}
.login-logo{font-size:24px;font-weight:800;color:#2A1D6E;margin-bottom:4px}
.login-sub{font-size:13px;color:#999;margin-bottom:24px}
.login-input{width:100%;padding:13px 16px;border:1.5px solid #EBEBEB;border-radius:12px;font-size:15px;font-family:inherit;outline:none;text-align:center;letter-spacing:4px;margin-bottom:12px}
.login-input:focus{border-color:#4A35A0}
.login-btn{width:100%;padding:14px;background:#2A1D6E;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
/* 헤더 */
.hd{background:#2A1D6E;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hd-logo{color:#fff;font-size:17px;font-weight:800}
.hd-logo span{color:#C5B8FF}
.hd-logout{color:rgba(255,255,255,.6);font-size:12px;background:none;border:none;cursor:pointer;font-family:inherit}
/* 탭 */
.tabs{background:#fff;display:flex;border-bottom:2px solid #EBEBEB;position:sticky;top:52px;z-index:99}
.tab{flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:700;color:#999;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px}
.tab.on{color:#4A35A0;border-bottom-color:#4A35A0}
/* 통계 */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 14px 0}
.stat{background:#fff;border-radius:12px;padding:14px 10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-num{font-size:22px;font-weight:800;color:#2A1D6E}
.stat-lbl{font-size:11px;color:#999;margin-top:2px}
/* 검색/필터 */
.filter-bar{padding:12px 14px;display:flex;gap:8px}
.f-input{flex:1;padding:9px 12px;border:1.5px solid #EBEBEB;border-radius:10px;font-size:13px;font-family:inherit;outline:none}
.f-input:focus{border-color:#4A35A0}
.f-sel{padding:9px 10px;border:1.5px solid #EBEBEB;border-radius:10px;font-size:12px;font-family:inherit;background:#fff;color:#555;outline:none}
/* 카드 */
.cards{padding:0 14px 90px}
.card{background:#fff;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-hd{display:flex;align-items:center;padding:12px 14px;gap:10px;border-bottom:1px solid #f5f5f5}
.card-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;flex-shrink:0}
.s-pending{background:#FFF9E6;color:#E6A817}
.s-approved{background:#E8F5E9;color:#2E7D32}
.card-infl{font-size:14px;font-weight:700;color:#191919}
.card-insta{font-size:11px;color:#999}
.card-body{padding:10px 14px}
.card-name{font-size:14px;font-weight:700;color:#191919;margin-bottom:5px}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.meta-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:#F0EEFF;color:#4A35A0;font-weight:600}
.card-dates{font-size:12px;color:#777;margin-bottom:10px}
.card-actions{display:flex;gap:7px}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:.15s}
.btn-approve{background:#E8F5E9;color:#2E7D32}
.btn-approve:hover{background:#C8E6C9}
.btn-edit{background:#EEE9FF;color:#4A35A0}
.btn-edit:hover{background:#DDD6FF}
.btn-del{background:#FFEBEE;color:#C62828}
.btn-del:hover{background:#FFCDD2}
.btn-pending{background:#FFF9E6;color:#E6A817}
/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;margin-bottom:16px;color:#191919}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:5px}
.modal-field input,.modal-field select{width:100%;padding:11px 13px;border:1.5px solid #EBEBEB;border-radius:10px;font-size:13px;font-family:inherit;outline:none}
.modal-field input:focus,.modal-field select:focus{border-color:#4A35A0}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-save{flex:1;padding:13px;background:#2A1D6E;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.modal-cancel{padding:13px 20px;background:#f5f5f5;color:#555;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
/* 삭제 확인 */
.del-modal{background:#fff;border-radius:20px;padding:24px;width:90%;max-width:340px;text-align:center}
.del-modal-ico{font-size:40px;margin-bottom:10px}
.del-modal-title{font-size:16px;font-weight:800;margin-bottom:6px}
.del-modal-desc{font-size:13px;color:#777;margin-bottom:18px;line-height:1.6}
.del-actions{display:flex;gap:8px}
.del-confirm{flex:1;padding:13px;background:#C62828;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.del-cancel{flex:1;padding:13px;background:#f5f5f5;color:#555;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.del-modal-bg{display:flex;align-items:center;justify-content:center;padding:20px}
/* 빈 상태 */
.empty{text-align:center;padding:48px 20px;color:#999;font-size:14px;line-height:2}
/* 로딩 */
.loading{text-align:center;padding:40px;color:#999;font-size:14px}
</style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">맘캘린더 <span>관리자</span></div>
    <div class="login-sub">관리자 비밀번호를 입력해주세요</div>
    <input class="login-input" id="pwInput" type="password" placeholder="••••••" maxlength="20"
      onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">로그인</button>
  </div>
</div>

<!-- 관리자 화면 -->
<div id="adminWrap" style="display:none">
  <div class="hd">
    <div class="hd-logo">맘캘린더 <span>관리자</span></div>
    <button class="hd-logout" onclick="logout()">로그아웃</button>
  </div>

  <div class="tabs">
    <div class="tab on" onclick="switchTab('all',this)">전체</div>
    <div class="tab" onclick="switchTab('pending',this)">대기중</div>
    <div class="tab" onclick="switchTab('approved',this)">승인됨</div>
  </div>

  <!-- 통계 -->
  <div class="stats">
    <div class="stat"><div class="stat-num" id="statTotal">-</div><div class="stat-lbl">전체 등록</div></div>
    <div class="stat"><div class="stat-num" id="statToday">-</div><div class="stat-lbl">오늘 오픈</div></div>
    <div class="stat"><div class="stat-num" id="statPending">-</div><div class="stat-lbl">승인 대기</div></div>
  </div>

  <!-- 검색/필터 -->
  <div class="filter-bar">
    <input class="f-input" id="searchInput" placeholder="인플루언서, 제품명 검색..." oninput="renderCards()">
    <select class="f-sel" id="majorFilter" onchange="renderCards()">
      <option value="">전체</option>
      <option>육아</option><option>리빙</option><option>인테리어</option>
      <option>식품</option><option>뷰티</option><option>패션</option>
      <option>여행</option><option>반려동물</option><option>가전</option>
    </select>
  </div>

  <div class="cards" id="cardList"></div>
</div>

<!-- 수정 모달 -->
<div class="modal-bg" id="editModal" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <div class="modal-title">✏️ 공구 수정</div>
    <input type="hidden" id="editId">
    <div class="modal-field"><label>인플루언서 한글명</label><input id="editInfluencer" type="text"></div>
    <div class="modal-field"><label>인스타그램 아이디</label><input id="editInsta" type="text"></div>
    <div class="modal-field"><label>대분류</label>
      <select id="editMajor">
        <option>육아</option><option>리빙</option><option>인테리어</option>
        <option>식품</option><option>뷰티</option><option>패션</option>
        <option>여행</option><option>반려동물</option><option>가전</option>
      </select>
    </div>
    <div class="modal-field"><label>소분류</label><input id="editMinor" type="text"></div>
    <div class="modal-field"><label>공구 제품명</label><input id="editName" type="text"></div>
    <div class="modal-field"><label>오픈 날짜</label><input id="editOpenDate" type="date"></div>
    <div class="modal-field"><label>마감 날짜</label><input id="editEndDate" type="date"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeEdit()">취소</button>
      <button class="modal-save" onclick="saveEdit()">저장하기</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-bg del-modal-bg" id="delModal" onclick="if(event.target===this)closeDel()">
  <div class="del-modal">
    <div class="del-modal-ico">🗑️</div>
    <div class="del-modal-title">삭제하시겠어요?</div>
    <div class="del-modal-desc" id="delDesc"></div>
    <div class="del-actions">
      <button class="del-cancel" onclick="closeDel()">취소</button>
      <button class="del-confirm" onclick="confirmDel()">삭제</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://hycaqsqeogjtbscmzrtm.supabase.co';
const SUPABASE_KEY='sb_publishable_u4hR4mdNTSss3kdjFH6R5Q_iuJ2MuGE';
const ADMIN_PW='momcal2024'; // ← 비밀번호 여기서 변경

let allData=[];
let curTab='all';
let delTargetId=null;

// 페이지 로드 시 모달 닫기
document.getElementById('delModal').classList.remove('on');
document.getElementById('editModal').classList.remove('on');

// ── 로그인 ──
function tryLogin(){
  const pw=document.getElementById('pwInput').value;
  if(pw===ADMIN_PW){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('adminWrap').style.display='block';
    sessionStorage.setItem('mc_admin','1');
    loadData();
  } else {
    alert('비밀번호가 틀렸어요!');
    document.getElementById('pwInput').value='';
  }
}
function logout(){
  sessionStorage.removeItem('mc_admin');
  location.reload();
}
// 세션 유지 (같은 탭에서만)
if(sessionStorage.getItem('mc_admin')==='1'){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('adminWrap').style.display='block';
  loadData();
}

// ── 데이터 로드 ──
async function loadData(){
  document.getElementById('cardList').innerHTML=`<div class="loading">불러오는 중... ⏳</div>`;
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/gonggu?order=open_date.asc&limit=1000`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    allData=await res.json();
    updateStats();
    renderCards();
  }catch(e){
    document.getElementById('cardList').innerHTML=`<div class="empty">데이터 로드 실패 😢</div>`;
  }
}

function updateStats(){
  const today=new Date();
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  document.getElementById('statTotal').textContent=allData.length;
  document.getElementById('statToday').textContent=allData.filter(d=>d.open_date===todayStr).length;
  document.getElementById('statPending').textContent=allData.filter(d=>!d.approved).length;
}

// ── 탭 ──
function switchTab(tab,el){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderCards();
}

// ── 카드 렌더 ──
function renderCards(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const major=document.getElementById('majorFilter').value;
  let arr=allData.filter(d=>{
    if(curTab==='pending'&&d.approved)return false;
    if(curTab==='approved'&&!d.approved)return false;
    if(major&&d.major!==major)return false;
    if(q&&![d.influencer,d.insta,d.name,d.major,d.minor].some(v=>(v||'').toLowerCase().includes(q)))return false;
    return true;
  });
  const el=document.getElementById('cardList');
  if(!arr.length){el.innerHTML=`<div class="empty">해당하는 공구가 없어요 🙅</div>`;return;}
  el.innerHTML=arr.map(d=>`
    <div class="card" id="card-${d.id}">
      <div class="card-hd">
        <span class="card-status ${d.approved?'s-approved':'s-pending'}">${d.approved?'✅ 승인됨':'⏳ 대기중'}</span>
        <div>
          <div class="card-infl">${d.influencer||'-'}</div>
          <div class="card-insta">@${d.insta||'-'}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-name">${d.name||'-'}</div>
        <div class="card-meta">
          <span class="meta-tag">${d.major||''}</span>
          ${d.minor?`<span class="meta-tag">${d.minor}</span>`:''}
        </div>
        <div class="card-dates">📅 ${d.open_date||'-'} 오픈${d.end_date?' ~ '+d.end_date+' 마감':''}</div>
        <div class="card-actions">
          ${d.approved
            ?`<button class="btn btn-pending" onclick="toggleApprove(${d.id},false)">승인 취소</button>`
            :`<button class="btn btn-approve" onclick="toggleApprove(${d.id},true)">✅ 승인</button>`
          }
          <button class="btn btn-edit" onclick="openEdit(${d.id})">✏️ 수정</button>
          <button class="btn btn-del" onclick="openDel(${d.id},'${(d.name||'').replace(/'/g,'')}')" >🗑️ 삭제</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ── 승인 토글 ──
async function toggleApprove(id,approved){
  await fetch(`${SUPABASE_URL}/rest/v1/gonggu?id=eq.${id}`,{
    method:'PATCH',
    headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`},
    body:JSON.stringify({approved})
  });
  allData=allData.map(d=>d.id===id?{...d,approved}:d);
  updateStats();renderCards();
}

// ── 수정 ──
function openEdit(id){
  const d=allData.find(d=>d.id===id);
  if(!d)return;
  document.getElementById('editId').value=id;
  document.getElementById('editInfluencer').value=d.influencer||'';
  document.getElementById('editInsta').value=d.insta||'';
  document.getElementById('editMajor').value=d.major||'육아';
  document.getElementById('editMinor').value=d.minor||'';
  document.getElementById('editName').value=d.name||'';
  document.getElementById('editOpenDate').value=d.open_date||'';
  document.getElementById('editEndDate').value=d.end_date||'';
  document.getElementById('editModal').classList.add('on');
}
function closeEdit(){document.getElementById('editModal').classList.remove('on');}
async function saveEdit(){
  const id=document.getElementById('editId').value;
  const payload={
    influencer:document.getElementById('editInfluencer').value.trim(),
    insta:document.getElementById('editInsta').value.trim().replace('@',''),
    major:document.getElementById('editMajor').value,
    minor:document.getElementById('editMinor').value.trim(),
    name:document.getElementById('editName').value.trim(),
    open_date:document.getElementById('editOpenDate').value,
    end_date:document.getElementById('editEndDate').value||null,
  };
  await fetch(`${SUPABASE_URL}/rest/v1/gonggu?id=eq.${id}`,{
    method:'PATCH',
    headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`},
    body:JSON.stringify(payload)
  });
  allData=allData.map(d=>d.id===parseInt(id)?{...d,...payload}:d);
  closeEdit();updateStats();renderCards();
  alert('수정 완료! ✅');
}

// ── 삭제 ──
function openDel(id,name){
  delTargetId=id;
  document.getElementById('delDesc').textContent=`"${name}" 을 삭제하면 복구할 수 없어요.`;
  document.getElementById('delModal').classList.add('on');
}
function closeDel(){document.getElementById('delModal').classList.remove('on');delTargetId=null;}
async function confirmDel(){
  if(!delTargetId)return;
  await fetch(`${SUPABASE_URL}/rest/v1/gonggu?id=eq.${delTargetId}`,{
    method:'DELETE',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  allData=allData.filter(d=>d.id!==delTargetId);
  closeDel();updateStats();renderCards();
}
</script>
</body>
</html>
